name: CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  pipeline:
    uses: platform-org/platform-actions/.github/workflows/backend-pipeline.yml@v1
    with:
      service-name: ${{ values.serviceName }}
      node-version: "20"
      deploy-environment: {% raw %}${{ github.ref == 'refs/heads/main' && 'staging' || 'preview' }}{% endraw %}
    secrets:
      registry-token: {% raw %}${{ secrets.GHCR_TOKEN }}{% endraw %}
      kubeconfig: {% raw %}${{ secrets.KUBECONFIG }}{% endraw %}
