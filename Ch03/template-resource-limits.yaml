# Chapter 3 - Securing Platform Access
# OPA Gatekeeper ConstraintTemplate: Require Resource Limits
#
# This ConstraintTemplate enforces that all containers in a Pod
# specify CPU and memory resource limits. This prevents unbounded
# resource consumption and ensures fair scheduling.
#
# Usage:
#   1. Apply this template: kubectl apply -f template-resource-limits.yaml
#   2. Create a Constraint resource referencing this template
#   3. Any pod without resource limits will be rejected
#
# References:
#   - https://open-policy-agent.github.io/gatekeeper/
#   - Kubernetes Resource Management docs

apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: resourcelimits
  annotations:
    description: "Requires all containers to have CPU and memory limits; optionally enforces a memory ceiling"
spec:
  crd:
    spec:
      names:
        kind: ResourceLimits
      validation:
        openAPIV3Schema:
          type: object
          properties:
            cpu:
              type: string
              description: "Maximum CPU limit allowed (e.g. '2'). Optional."
            memory:
              type: string
              description: "Maximum memory limit allowed (e.g. '4Gi'). Optional."
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package resourcelimits

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.memory
          msg := sprintf("Container '%v' missing memory limits", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.cpu
          msg := sprintf("Container '%v' missing CPU limits", [container.name])
        }

        # Reject if memory limit exceeds the per-environment maximum
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          mem_limit := container.resources.limits.memory
          exceeds_max_memory(mem_limit)
          msg := sprintf("Container '%v' memory limit %v exceeds maximum", [container.name, mem_limit])
        }

        exceeds_max_memory(mem) {
          mem_value := units.parse_bytes(mem)
          max_value := units.parse_bytes(input.parameters.memory)
          mem_value > max_value
        }
