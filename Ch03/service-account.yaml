# =============================================================================
# service-account.yaml — CI/CD Deployer Service Account (Chapter 3, Step 1)
# =============================================================================
# Creates a dedicated service account for the CI/CD pipeline scoped to the
# staging namespace. This account intentionally has NO permissions by itself —
# permissions are granted separately via role-minimal-deployer.yaml (Step 2)
# and rolebinding.yaml (Step 3).
#
# Keeping the ServiceAccount, Role, and RoleBinding in separate files makes
# the permission grant explicit and auditable. Never bundle them into one file,
# as that obscures the permission grant in reviews.
#
# Usage:
#   kubectl apply -f service-account.yaml
#   # Generate a short-lived token for use in CI:
#   kubectl create token ci-cd-deployer -n staging --duration=1h
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-cd-deployer
  namespace: staging
  labels:
    app: ci-cd-pipeline
    environment: staging
