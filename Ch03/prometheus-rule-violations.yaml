# =============================================================================
# prometheus-rule-violations.yaml — OPA Gatekeeper Violation Alerting
# =============================================================================
# PrometheusRule that fires when teams repeatedly attempt forbidden operations.
# Gatekeeper exposes a gatekeeper_violations_total metric — this rule turns
# spikes in that metric into actionable alerts routed to the security team.
#
# Prerequisites:
#   - kube-prometheus-stack (or Prometheus Operator) installed
#   - Gatekeeper installed and metrics scraping enabled
#
# Usage:
#   kubectl apply -f prometheus-rule-violations.yaml
#
# Verify the rule loaded:
#   kubectl get prometheusrule opa-violations -n gatekeeper-system
#   # Check Prometheus has picked it up:
#   # Navigate to Prometheus UI -> Alerts -> search "HighPolicyViolationRate"
# =============================================================================

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: opa-violations
  namespace: gatekeeper-system
  labels:
    # Required by kube-prometheus-stack to discover this rule
    release: kube-prometheus-stack
    app: gatekeeper
spec:
  groups:
    - name: opa.rules
      interval: 30s
      rules:
        # ── Alert: sustained high violation rate ──────────────────────────────
        # Fires when teams are generating more than 0.1 policy violations per
        # second averaged over 5 minutes. This typically indicates a broken
        # CI/CD pipeline attempting forbidden operations repeatedly.
        - alert: HighPolicyViolationRate
          expr: rate(gatekeeper_violations_total[5m]) > 0.1
          for: 2m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "High rate of OPA policy violations ({{ $value | humanize }} per second)"
            description: >
              Teams are frequently attempting forbidden operations.
              Check which constraint is being violated most often:
              kubectl get constraints -A
            runbook_url: "https://wiki.internal/platform/runbooks/opa-violations"

        # ── Alert: any new admission denial in platform namespaces ────────────
        # Fires immediately when a resource is denied in a platform-owned
        # namespace (istio-system, flux-system, etc.) — these are higher
        # severity because they may indicate a misconfigured operator or
        # a platform team workflow issue.
        - alert: PlatformNamespacePolicyViolation
          expr: |
            increase(gatekeeper_violations_total{
              namespace=~"flux-system|istio-system|cert-manager|gatekeeper-system"
            }[5m]) > 0
          for: 0m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Policy violation in platform namespace {{ $labels.namespace }}"
            description: >
              A Gatekeeper policy was violated in a platform-managed namespace.
              This is unexpected and may indicate a misconfigured operator.
              Inspect: kubectl get events -n {{ $labels.namespace }} --field-selector reason=FailedCreate
