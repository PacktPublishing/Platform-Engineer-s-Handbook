# =============================================================================
# constraint-resource-limits.yaml — Enforce Resource Limits on Deployments
# =============================================================================
# Constraint referencing the ResourceLimits ConstraintTemplate defined in
# template-resource-limits.yaml. Rejects Deployments whose containers lack
# CPU or memory limits, or exceed the per-environment maxima.
#
# Apply the template first, then this constraint:
#   kubectl apply -f template-resource-limits.yaml
#   kubectl apply -f constraint-resource-limits.yaml
# =============================================================================

apiVersion: constraints.gatekeeper.sh/v1beta1
kind: ResourceLimits
metadata:
  name: require-resource-limits
  annotations:
    description: "All containers must specify CPU and memory limits within allowed maxima"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    # Exclude system namespaces that run privileged workloads
    excludedNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - gatekeeper-system
      - flux-system
      - istio-system
      - platform-services
      - default
  parameters:
    cpu: "2"       # No single container may request more than 2 CPU cores
    memory: "4Gi"  # No single container may request more than 4GiB memory
