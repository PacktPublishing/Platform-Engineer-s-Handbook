# Chapter 11: GitHub Actions Workflow for Policy Validation
# Listing 11.8 - CI/CD pipeline integration for shift-left policy testing
# Runs conftest against Kubernetes manifests on every pull request.

name: Policy Validation
on: [pull_request]
jobs:
  conftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.67.0/conftest_0.67.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.67.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
      - name: Run policy tests
        run: conftest test manifests/ -p policy/
