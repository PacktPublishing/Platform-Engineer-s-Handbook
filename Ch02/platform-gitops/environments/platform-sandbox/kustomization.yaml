# =============================================================================
# platform-gitops/environments/platform-sandbox/kustomization.yaml
# =============================================================================
# Entry point for the platform-sandbox environment in the platform-gitops
# App of Apps repository. Instructs the Flux controller to include all
# tenant configurations declared under the tenants/ directory.
#
# Referenced by the Flux Kustomization CRD seeded via the flux.seed_gitops()
# call in the platform-core Pulumi module.
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      env: platform-sandbox
    includeSelectors: true
    includeTemplates: true

resources:
  - tenants    # Include all tenant directories declared under tenants/
