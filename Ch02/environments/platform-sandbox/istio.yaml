# =============================================================================
# environments/platform-sandbox/istio.yaml — Istio Version Overlay
# =============================================================================
# Per-environment patch that pins the Istio chart version for platform-sandbox.
# Apply this patch via the kustomization.yaml in this directory.
#
# To upgrade Istio in this environment:
#   1. Update the three version strings below
#   2. Commit and push — GitOps will apply the upgrade automatically
#   3. Monitor: flux get helmrelease -n flux-system
# =============================================================================

---
# Patch: pin istio-base version for platform-sandbox
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: flux-system
spec:
  chart:
    spec:
      version: "1.22.4"   # Pin to a specific patch release — never use wildcards

---
# Patch: pin istiod version for platform-sandbox
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: flux-system
spec:
  chart:
    spec:
      version: "1.22.4"

---
# Patch: pin istio-ingress version for platform-sandbox
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: flux-system
spec:
  chart:
    spec:
      version: "1.22.4"
