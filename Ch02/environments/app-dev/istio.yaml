# =============================================================================
# environments/app-dev/istio.yaml — Istio Version Overlay: app-dev
# =============================================================================
# Pins the Istio chart version for the app-dev environment.
# Promote from platform-sandbox by updating these versions and pushing the tag.
# =============================================================================

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: flux-system
spec:
  chart:
    spec:
      version: "1.22.4"

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: flux-system
spec:
  chart:
    spec:
      version: "1.22.4"

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: flux-system
spec:
  chart:
    spec:
      version: "1.22.4"
